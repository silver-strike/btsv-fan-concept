<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Beyond the Spider-Verse — Fan Concept</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&family=VT323&display=swap" rel="stylesheet">
  <style>
    :root {
      --black:#000; --red:#e5001a; --red-dim:#8a0010; --red-dark:#1f0005;
      --blue:#0088ff; --blue-dim:#004a99; --blue-dark:#000d1f;
      --white:#f0e8e8; --ink:#5a2030;
      --red-glow:0 0 10px #e5001a,0 0 25px #e5001a88;
      --blue-glow:0 0 10px #0088ff,0 0 22px #0088ff66;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    ::selection{background:var(--red);color:#fff}
    html{scroll-behavior:smooth}
    body{background:var(--black);color:var(--white);font-family:'Share Tech Mono',monospace;overflow-x:hidden;cursor:crosshair}

    #matrix-canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;opacity:.09;pointer-events:none}
    body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(229,0,26,.018) 2px,rgba(229,0,26,.018) 4px);pointer-events:none;z-index:9998}
    body::after{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at center,transparent 40%,rgba(0,0,0,.75) 100%);pointer-events:none;z-index:9997}

    @keyframes glitch{0%,88%,100%{clip-path:none;transform:none}90%{clip-path:inset(15% 0 70% 0);transform:translate(-5px,0);color:var(--blue)}92%{clip-path:inset(65% 0 10% 0);transform:translate(5px,0);color:var(--red)}94%{clip-path:none;transform:none;color:inherit}}
    @keyframes titleGlitch{0%,85%,100%{text-shadow:var(--red-glow)}87%{text-shadow:-3px 0 var(--blue),3px 0 var(--red);letter-spacing:.05em}89%{text-shadow:3px 0 var(--blue),-3px 0 var(--red)}91%{text-shadow:var(--red-glow)}}
    @keyframes borderFlash{0%,90%,100%{border-color:var(--red-dark)}92%{border-color:var(--blue);box-shadow:var(--blue-glow)}94%{border-color:var(--red);box-shadow:var(--red-glow)}96%{border-color:var(--red-dark);box-shadow:none}}
    @keyframes fadeUp{from{opacity:0;transform:translateY(25px)}to{opacity:1;transform:translateY(0)}}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
    @keyframes scanH{0%{transform:translateX(-100%)}100%{transform:translateX(200%)}}
    @keyframes drift{0%,100%{transform:translateY(0) rotate(0deg)}33%{transform:translateY(-12px) rotate(4deg)}66%{transform:translateY(6px) rotate(-2deg)}}

    header.hero{min-height:100vh;display:flex;flex-direction:column;justify-content:flex-end;padding:6rem 3rem 4rem;position:relative;overflow:hidden;border-bottom:1px solid #1a0005;z-index:1}
    .hero-glow{position:absolute;inset:0;background:radial-gradient(ellipse 60% 50% at 80% 30%,rgba(229,0,26,.12) 0%,transparent 70%),radial-gradient(ellipse 40% 40% at 10% 80%,rgba(0,136,255,.06) 0%,transparent 60%);pointer-events:none}
    .spot-hole{position:absolute;border-radius:50%;border:1px solid rgba(229,0,26,.08);background:radial-gradient(circle,rgba(0,0,0,.95) 55%,rgba(229,0,26,.03) 100%);animation:drift 10s ease-in-out infinite;pointer-events:none}
    .hero-content{position:relative;z-index:2;max-width:900px}
    .hero-eyebrow{font-size:.68rem;letter-spacing:.28em;text-transform:uppercase;color:var(--red-dim);margin-bottom:1.5rem;opacity:0;animation:fadeUp .6s ease forwards .3s}
    .hero-eyebrow::before{content:'> ';color:var(--red)}
    .cursor-blink{display:inline-block;width:9px;height:1em;background:var(--red);margin-left:4px;vertical-align:middle;animation:blink 1s step-end infinite;box-shadow:var(--red-glow)}
    .cursor-blink.blue{background:var(--blue);box-shadow:var(--blue-glow)}
    .hero-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(5rem,14vw,12rem);line-height:.9;color:var(--white);text-shadow:var(--red-glow);opacity:0;animation:fadeUp .6s ease forwards .5s,titleGlitch 7s ease-in-out infinite 2s;position:relative}
    .hero-title::before,.hero-title::after{position:absolute;top:0;left:0;font-family:'Bebas Neue',sans-serif;font-size:inherit;line-height:inherit;pointer-events:none}
    .hero-title::before{content:attr(data-text);color:var(--red);animation:glitch 7s ease-in-out infinite 2s;clip-path:inset(0 0 75% 0);transform:translate(-4px,1px);opacity:.6}
    .hero-title::after{content:attr(data-text);color:var(--blue);animation:glitch 7s ease-in-out infinite 2.15s;clip-path:inset(75% 0 0 0);transform:translate(4px,-1px);opacity:.5}
    .hero-title .red{color:var(--red);text-shadow:var(--red-glow)}
    .hero-subtitle{font-family:'VT323',monospace;font-size:clamp(1.2rem,2.5vw,1.8rem);color:#6a3040;margin-top:1.5rem;max-width:620px;line-height:1.6;opacity:0;animation:fadeUp .6s ease forwards .7s}
    .hero-meta{display:flex;gap:2rem;margin-top:3rem;opacity:0;animation:fadeUp .6s ease forwards .9s;flex-wrap:wrap}
    .hero-meta-item{border:1px solid #1f0005;padding:.75rem 1.25rem;animation:borderFlash 9s ease-in-out infinite}
    .hero-meta-item.blue-item{border-color:#000d1f;animation:none}
    .hero-meta-item.blue-item:hover{border-color:var(--blue-dim);box-shadow:var(--blue-glow)}
    .hero-meta-item .label{font-size:.55rem;letter-spacing:.25em;text-transform:uppercase;color:var(--ink);margin-bottom:.3rem;display:block}
    .hero-meta-item .value{font-size:.85rem;color:var(--white)}
    .hero-meta-item.blue-item .value{color:var(--blue)}

    .container{max-width:1100px;margin:0 auto;padding:0 3rem;position:relative;z-index:1}
    section{padding:7rem 0;border-bottom:1px solid #0d0003;opacity:0;transform:translateY(30px);transition:opacity .6s ease,transform .6s ease;position:relative;z-index:1}
    section.visible{opacity:1;transform:translateY(0)}
    .section-number{font-size:.62rem;letter-spacing:.25em;text-transform:uppercase;color:var(--ink);margin-bottom:1rem;display:flex;align-items:center;gap:1rem}
    .section-number::before{content:'// ';color:var(--red-dim)}
    .section-number::after{content:'';flex:1;max-width:60px;height:1px;background:var(--red-dark)}
    .section-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(2.5rem,6vw,5rem);line-height:1;letter-spacing:.02em;margin-bottom:3rem;color:var(--white);text-shadow:0 0 6px rgba(229,0,26,.4);animation:titleGlitch 12s ease-in-out infinite;white-space:pre-line}
    .section-title .em{color:var(--red);font-style:normal;text-shadow:var(--red-glow)}
    .section-title .blue-em{color:var(--blue);text-shadow:var(--blue-glow)}
    .body-text{font-size:.92rem;line-height:1.9;color:#b08090;max-width:680px}
    .body-text+.body-text,.body-text.mt{margin-top:1.5rem}

    .two-col{display:grid;grid-template-columns:1fr 1fr;gap:4rem;align-items:start}
    .col-padded{padding-top:6rem}

    .mechanic-block{background:#000;border:1px solid #1a0005;border-left:3px solid var(--red);padding:2rem 2.5rem;margin-top:2px;position:relative;overflow:hidden;animation:borderFlash 11s ease-in-out infinite}
    .mechanic-block.blue{border-left-color:var(--blue);border-color:#000d1f;animation:none}
    .mechanic-label{font-size:.58rem;letter-spacing:.25em;text-transform:uppercase;color:var(--red-dim);margin-bottom:.75rem}
    .mechanic-label::before{content:'['}
    .mechanic-label::after{content:']'}
    .mechanic-block.blue .mechanic-label{color:var(--blue-dim)}
    .mechanic-text{font-size:.9rem;line-height:1.8;color:#b08090;white-space:pre-line}
    .mechanic-block.blue .mechanic-text{color:#5a8ab0}

    .char-cards{display:grid;grid-template-columns:1fr 1fr;gap:2px;margin:3rem 0}
    .char-card{padding:3rem 2.5rem;border:1px solid #1a0005;position:relative;overflow:hidden;transition:border-color .3s,box-shadow .3s}
    .char-card::before{content:'';position:absolute;top:0;left:0;width:100%;height:2px;animation:scanH 4s linear infinite;opacity:.5}
    .char-card.red-card::before{background:linear-gradient(90deg,transparent,var(--red),transparent)}
    .char-card.blue-card::before{background:linear-gradient(90deg,transparent,var(--blue),transparent)}
    .char-card.red-card:hover{border-color:var(--red);box-shadow:var(--red-glow)}
    .char-card.blue-card:hover{border-color:var(--blue);box-shadow:var(--blue-glow)}
    .char-name{font-family:'VT323',monospace;font-size:3.5rem;margin-bottom:1.5rem;display:flex;align-items:flex-end;gap:.75rem}
    .char-name.red{color:var(--red);text-shadow:var(--red-glow)}
    .char-name.blue{color:var(--blue);text-shadow:var(--blue-glow)}
    .char-sub{font-family:'Share Tech Mono',monospace;font-size:.58rem;letter-spacing:.2em;text-transform:uppercase;color:var(--ink);margin-bottom:.75rem}
    .char-body{font-size:.85rem;line-height:1.85;color:#6a3040}
    .char-card.blue-card .char-body{color:#1e3a5a}

    .t-hl{background:rgba(229,0,26,.1);color:var(--white);padding:.1em .3em;border:1px solid #1a0005}

    .gwen-layout{display:grid;grid-template-columns:1fr 300px;gap:5rem}
    .gwen-sidebar{padding-top:5rem;display:flex;flex-direction:column}
    .sidebar-block{padding:1.5rem;border:1px solid #0d0003;border-bottom:none;transition:border-color .3s,background .3s}
    .sidebar-block:last-child{border-bottom:1px solid #0d0003}
    .sidebar-block:hover{border-color:var(--red-dark);background:#050000}
    .sidebar-block.blue{border-color:#000a14}
    .sidebar-block.blue:hover{border-color:var(--blue-dark);background:#000d1f}
    .sidebar-label{font-size:.58rem;letter-spacing:.25em;text-transform:uppercase;color:var(--ink);margin-bottom:.6rem}
    .sidebar-label::before{content:'> ';color:var(--red-dim)}
    .sidebar-block.blue .sidebar-label::before{color:var(--blue-dim)}
    .sidebar-value{font-size:.85rem;line-height:1.7;color:#6a3040}
    .sidebar-block.blue .sidebar-value{color:#1e3a5a}
    .pull-quote{font-family:'VT323',monospace;font-size:clamp(1.4rem,2.5vw,2.2rem);line-height:1.5;color:var(--white);border-left:3px solid var(--red);padding:1.5rem 0 1.5rem 2.5rem;margin:2.5rem 0;text-shadow:0 0 6px rgba(229,0,26,.3);animation:titleGlitch 14s ease-in-out infinite}
    .divider{width:100%;height:1px;background:linear-gradient(90deg,transparent,#1a0005,transparent);margin:3rem 0}

    .last-words-block{background:#000;border:1px solid #1a0005;padding:5rem 4rem;margin:3rem 0;text-align:center;position:relative;overflow:hidden;animation:borderFlash 5s ease-in-out infinite}
    .last-words-block::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at center,rgba(229,0,26,.05) 0%,transparent 70%);pointer-events:none}
    .last-words-block::after{content:'';position:absolute;top:50%;left:-100%;width:60%;height:1px;background:linear-gradient(90deg,transparent,var(--red),transparent);animation:scanH 5s linear infinite}
    .last-words-text{font-family:'VT323',monospace;font-size:clamp(3rem,7vw,6rem);color:var(--white);line-height:1.15;text-shadow:var(--red-glow);animation:titleGlitch 4s ease-in-out infinite;position:relative;z-index:1}
    .last-words-text span{color:var(--red);text-shadow:var(--red-glow);display:block;font-size:1.3em;animation:titleGlitch 3s ease-in-out infinite .5s}
    .last-words-attr{margin-top:2rem;font-size:.62rem;letter-spacing:.35em;text-transform:uppercase;color:var(--ink);position:relative;z-index:1}
    .last-words-attr::before{content:'— '}

    .themes-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:2px;margin-top:3rem}
    .theme-card{padding:2.5rem 2rem;background:#050000;border:1px solid #0d0003;transition:border-color .3s,box-shadow .3s;cursor:default}
    .theme-card:hover{border-color:var(--red-dark);box-shadow:inset 0 0 30px rgba(229,0,26,.04)}
    .theme-card.blue:hover{border-color:var(--blue-dark);box-shadow:inset 0 0 30px rgba(0,136,255,.04)}
    .theme-card:hover .theme-name{text-shadow:var(--red-glow);animation:titleGlitch 2s ease-in-out infinite}
    .theme-card.blue:hover .theme-name{text-shadow:var(--blue-glow);animation:none;color:var(--blue)}
    .theme-icon{font-size:1.2rem;margin-bottom:1.5rem;display:block;color:var(--red-dim)}
    .theme-card.blue .theme-icon{color:var(--blue-dim)}
    .theme-name{font-family:'VT323',monospace;font-size:1.8rem;color:var(--white);margin-bottom:.75rem;transition:text-shadow .3s,color .3s}
    .theme-desc{font-size:.82rem;line-height:1.7;color:#4a2030}
    .theme-card.blue .theme-desc{color:#1a2a40}

    .ending-grid{display:grid;grid-template-columns:1fr 1fr;gap:2px;margin-top:3rem}
    .ending-panel{padding:3rem 2.5rem;background:#050000;border:1px solid #0d0003;position:relative;transition:border-color .3s}
    .ending-panel:hover{border-color:var(--red-dark)}
    .ending-panel.void{background:#000;border-color:#050005}
    .ending-panel-label{font-size:.58rem;letter-spacing:.25em;text-transform:uppercase;color:var(--red-dim);margin-bottom:1.5rem}
    .ending-panel-label::before{content:'// '}
    .ending-panel-title{font-family:'VT323',monospace;font-size:2.5rem;color:var(--white);margin-bottom:1.5rem;text-shadow:0 0 6px rgba(229,0,26,.3)}
    .ending-panel.void .ending-panel-title{color:#1a0a10;text-shadow:none}
    .ending-panel-body{font-size:.85rem;line-height:1.85;color:#4a2030}
    .ending-panel.void .ending-panel-body{color:#150a10}
    .void-tag{color:#0d0510;font-size:.75rem;letter-spacing:.15em;display:block;margin-top:1.5rem}

    footer{padding:5rem 3rem;display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:2rem;position:relative;z-index:1;border-top:1px solid #0d0003}
    .footer-concept{font-size:.65rem;letter-spacing:.2em;text-transform:uppercase;color:var(--ink);line-height:1.8}
    .footer-concept::before{content:'> ';color:var(--red-dim)}
    .footer-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(1.5rem,4vw,3rem);color:#1a0005;line-height:1}
    .footer-chaos{font-family:'VT323',monospace;font-size:1.1rem;color:var(--blue);text-shadow:var(--blue-glow)}

    #audio-stack{position:fixed;bottom:2rem;right:2rem;z-index:10000;display:flex;flex-direction:column;gap:6px;min-width:250px}
    .audio-box{background:#000;padding:.9rem 1.1rem;display:flex;align-items:center;gap:.75rem;position:relative;overflow:hidden}
    .audio-box::before{content:'';position:absolute;top:0;left:0;width:100%;height:1px;animation:scanH 3s linear infinite}
    .audio-box.red-box{border:1px solid #1a0005;animation:borderFlash 8s ease-in-out infinite}
    .audio-box.red-box::before{background:linear-gradient(90deg,transparent,var(--red),transparent)}
    .audio-box.blue-box{border:1px solid #000d1f}
    .audio-box.blue-box::before{background:linear-gradient(90deg,transparent,var(--blue),transparent);animation-delay:1.5s}
    .audio-play-btn{background:none;width:30px;height:30px;cursor:pointer;font-size:.75rem;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .2s,box-shadow .2s;font-family:'Share Tech Mono',monospace;border:none}
    .audio-box.red-box .audio-play-btn{border:1px solid var(--red);color:var(--red)}
    .audio-box.blue-box .audio-play-btn{border:1px solid var(--blue);color:var(--blue)}
    .audio-box.red-box .audio-play-btn:hover{background:rgba(229,0,26,.15);box-shadow:var(--red-glow)}
    .audio-box.blue-box .audio-play-btn:hover{background:rgba(0,136,255,.1);box-shadow:var(--blue-glow)}
    .audio-info{display:flex;flex-direction:column;gap:.2rem;overflow:hidden;flex:1}
    .audio-title{font-size:.62rem;letter-spacing:.15em;text-transform:uppercase;color:var(--white);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .audio-box.red-box .audio-title::before{content:'♪ ';color:var(--red)}
    .audio-box.blue-box .audio-title::before{content:'♪ ';color:var(--blue)}
    .audio-artist{font-size:.52rem;letter-spacing:.08em;color:var(--ink)}
    .audio-progress-wrap{width:100%;height:2px;cursor:pointer;position:relative;margin-top:.4rem}
    .audio-box.red-box .audio-progress-wrap{background:#1a0005}
    .audio-box.blue-box .audio-progress-wrap{background:#000d1f}
    .audio-progress-bar{height:100%;width:0%;transition:width .3s linear}
    .audio-box.red-box .audio-progress-bar{background:var(--red);box-shadow:var(--red-glow)}
    .audio-box.blue-box .audio-progress-bar{background:var(--blue);box-shadow:var(--blue-glow)}
    .audio-vol{background:none;border:none;color:var(--ink);cursor:pointer;font-size:.65rem;font-family:'Share Tech Mono',monospace;padding:0;flex-shrink:0;transition:color .2s}
    .audio-box.red-box .audio-vol:hover{color:var(--red)}
    .audio-box.blue-box .audio-vol:hover{color:var(--blue)}

    @media(max-width:768px){
      header.hero{padding:5rem 1.5rem 3rem}
      .container{padding:0 1.5rem}
      section{padding:5rem 0}
      .two-col,.gwen-layout,.char-cards,.ending-grid{grid-template-columns:1fr;gap:2rem}
      .col-padded,.gwen-sidebar{padding-top:0}
      .last-words-block{padding:3rem 1.5rem}
      #audio-stack{bottom:1rem;right:1rem;min-width:unset}
    }
  </style>
</head>
<body>
<canvas id="matrix-canvas"></canvas>
<script>
const DATA = {
  meta: [
    { label: 'CHAOS_COEFF', value: 'MAXIMUM' },
    { label: 'CANON_EVENTS', value: 'BROKEN: ALL' },
    { label: 'SEQUEL', value: 'NULL', blue: true },
  ],
  sections: [
    {
      id: 'premise', number: '01 — CORE_PREMISE',
      title: ['Two ', { em: 'Anomalies.' }, '\nOne Truth.'],
      content: [
        { type: 'grid', items: [
          { type: 'col', children: [
            { type: 'p', text: "Miles Morales and The Spot team up. One was told he doesn't belong anywhere. The other was literally made of holes. Together, they systematically dismantle the entire concept of canon events." },
            { type: 'p', text: "The spider society built their entire system on the idea that there is one correct timeline, one correct story. Miles and Spot are living proof that the multiverse doesn't actually work that way." },
          ]},
          { type: 'col', pad: true, children: [
            { type: 'mechanic', label: 'CENTRAL_THESIS', text: "Anomalies aren't errors.\nThey're evolution." },
            { type: 'mechanic', label: 'SYSTEM_ERROR', text: "There is one correct story. One correct timeline. Miguel O'Hara built a religion around this idea — and became the villain of his own.", blue: true },
          ]},
        ]},
      ],
    },
    {
      id: 'alliance', number: '02 — THE_ALLIANCE',
      title: ['Miles ', { blueEm: '&' }, ' Spot'],
      bg: '#050000',
      content: [
        { type: 'charCards', cards: [
          { name: 'Miles', sub: '// the anomaly', color: 'red', text: "He knows what it feels like to be told he doesn't belong. To be the anomaly. To have everyone write him off. That's exactly why he's the only person who could look at Spot and genuinely understand him — because he's lived it." },
          { name: 'Spot',  sub: '// the void',    color: 'blue', text: "He didn't start wanting to be a villain. He was a scientist who got absolutely cooked by Miles — accidentally. The multiverse trauma radicalized him. The holes in his body are a metaphor for feeling incomplete. He's what happens when an anomaly is never shown grace." },
        ]},
        { type: 'mechanic', label: 'TRAVEL_MECHANIC', span: true, text: "In ATSV, the Spider Society used a special band to travel between universes. Miles didn't have one — contained, controlled, monitored. But with Spot's portals? He now has the most organic, ungoverned version of that ability imaginable. No bureaucracy. No Miguel breathing down his neck. No gatekeeping. Just two anomalies going anywhere they want. Miguel's vein is pulsing somewhere in the multiverse." },
        { type: 'p', highlight: '"Hey. I did that to you. I\'m sorry."', text: " Spot doesn't know what to do with that. Nobody has ever done that before.", mt: true },
      ],
    },
    {
      id: 'gwen', number: '03 — CANON_EVENT',
      title: ['Gwen ', { em: 'Stacy' }],
      content: [
        { type: 'gwenLayout',
          left: [
            { type: 'p', text: "Gwen Stacy is both of their canon events. Miles' canon is losing someone he loves. Spot's canon is the accident that destroyed him. And Gwen is somehow the thread connecting both of their tragedies — without even knowing she's carrying that weight for two people simultaneously." },
            { type: 'pullquote', text: "What if Gwen finds out she's their canon event? And she has to decide whether to tell them — knowing they'll burn the multiverse down for her." },
            { type: 'p', text: "Miles spent all of ATSV fighting to save his dad from a canon event. And now the universe says: cool, here's another one. Except this time it's Gwen — and he just broke the entire system trying to prevent this exact moment." },
            { type: 'divider' },
            { type: 'p', highlight: '// GUT_PUNCH', text: " — Spot accidentally does to Gwen exactly what Miles accidentally did to Spot. The same cycle. The same guilt. Except now Spot has to watch Miles look at him the way he used to look at Miles — and Miles has to hold both his grief for Gwen AND his understanding that Spot didn't mean it." },
            { type: 'p', text: 'They break each other. Spot disappears. Miles chases him. Gwen is somewhere in the middle.' },
          ],
          sidebar: [
            { label: 'MILES_CANON', value: 'Losing someone he loves' },
            { label: 'SPOT_CANON',  value: 'The accident that destroyed him', blue: true },
            { label: 'CONNECTION',  value: "Gwen. Both threads. One person. She doesn't know she's carrying it." },
            { label: 'THE_CHOICE',  value: "Her quietly accepting it vs. them absolutely refusing. Her choice. Their chaos.", blue: true },
          ],
        },
      ],
    },
    {
      id: 'hobie', number: '04 — FATAL_ERROR',
      title: ['Hobie ', { em: 'Brown' }],
      bg: '#000',
      content: [
        { type: 'p', text: "Miguel O'Hara kills Hobie Brown. Sony takes the one character who never took anything seriously — punk rock chaos incarnate, who made everything feel lighter just by existing in a scene — and uses that to make the death hit hardest." },
        { type: 'p', text: "Miles' spider sense activates before he even knows what it means. His body knows before his brain catches up. Hobie was his person. The one who believed in him when everyone else was against him. Hobie slipped him the watch. Hobie chose him.", mt: true },
        { type: 'lastWords', line1: '"Stay strong...', line2: 'Miles."', attr: 'HOBIE_BROWN // LAST_WORDS // [SIGNAL_LOST]' },
        { type: 'p', text: 'Not a joke. Not a quip. Not "told you so." Hobie — who deflected everything with sarcasm his entire life — uses his last breath to say the most sincere thing he\'s ever said to anyone. And he calls him Miles. Not Spider-Man. Not the anomaly. Miles. Like Hobie wanted his last words to reach the person, not the symbol.' },
        { type: 'p', text: "Spot catches Miles when he collapses. Because that's all he can do. And Miguel O'Hara, somewhere, thinks he did the right thing.", mt: true },
      ],
    },
    {
      id: 'themes', number: '05 — CORE_THEMES',
      title: ["What It's ", { em: 'Really' }, ' About'],
      content: [
        { type: 'themeGrid', themes: [
          { icon: '⬤', name: 'CYCLES_OF_GUILT',    desc: "Spot did to Gwen what Miles did to Spot. The pattern repeats until someone breaks it. That's the tragedy — and the hope." },
          { icon: '◯', name: 'BELONGING',           desc: "Both were told they don't fit. Together they prove the system was wrong about them. Anomalies aren't errors — they're evolution.", blue: true },
          { icon: '△', name: 'REDEMPTION',          desc: "Spot tries to be good. It's not enough. And that's the tragedy. Redemption without resolution is still redemption." },
          { icon: '✕', name: 'PAIN_NOT_INEVITABLE', desc: 'The canon event system said "take the L." Miles and Spot said no. Whether they\'re right costs everything.', blue: true },
        ]},
      ],
    },
    {
      id: 'ending', number: '06 — END_OF_LINE',
      title: ['No Sequel.\n', { em: 'No Resolution.' }],
      bg: '#000',
      content: [
        { type: 'p', text: "Marvel and Sony are obsessed with setting up the next thing. This movie says: no. This is the end. Sit with it. An unresolved ending for a story about broken canon events and rewriting fate is the most poetic choice possible." },
        { type: 'p', text: "The movie itself becomes an anomaly. No neat conclusion. No canon ending. The story breaks its own rules — just like they did. People will talk about it for decades.", mt: true },
        { type: 'endingGrid', panels: [
          { label: 'THE_ENDING',   title: 'It Just... Ends.', body: "The film closes without resolution, without a bow on it, without the next adventure teased. Just the weight of everything that happened sitting in the audience's chest." },
          { label: 'POST_CREDITS', title: "Inside Spot's Head.", body: "Infinite darkness. Holes. Emptiness. He's just sitting there. And you hear Miles' voice — or Gwen's — echoing through the portals like fragments he can't let go of. Spot doesn't say anything. He just looks at his hands.", void: true },
        ]},
      ],
    },
  ],
};

function el(tag, cls, props = {}) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  Object.entries(props).forEach(([k, v]) => {
    if (k === 'html') e.innerHTML = v;
    else if (k === 'text') e.textContent = v;
    else e.setAttribute(k, v);
  });
  return e;
}

function buildTitle(parts) {
  const h = el('h2', 'section-title');
  parts.forEach(p => {
    if (typeof p === 'string') h.appendChild(document.createTextNode(p));
    else if (p.em)     { const s = el('span','em');      s.textContent = p.em;     h.appendChild(s); }
    else if (p.blueEm) { const s = el('span','blue-em'); s.textContent = p.blueEm; h.appendChild(s); }
  });
  return h;
}

function buildMechanic(item) {
  const block = el('div', `mechanic-block${item.blue ? ' blue' : ''}`);
  block.append(el('div','mechanic-label',{text:item.label}), el('p','mechanic-text',{text:item.text}));
  return block;
}

function buildP(item) {
  const p = el('p', `body-text${item.mt ? ' mt' : ''}`);
  if (item.highlight) {
    p.appendChild(el('span','t-hl',{text:item.highlight}));
    if (item.text) p.appendChild(document.createTextNode(item.text));
  } else {
    p.textContent = item.text || '';
  }
  return p;
}

function buildContent(items) {
  const frag = document.createDocumentFragment();
  items.forEach(item => {
    if (item.type === 'p') {
      frag.appendChild(buildP(item));
    } else if (item.type === 'mechanic') {
      frag.appendChild(buildMechanic(item));
    } else if (item.type === 'grid') {
      const grid = el('div','two-col');
      item.items.forEach(col => {
        const colEl = el('div', col.pad ? 'col-padded' : '');
        col.children.forEach(c => colEl.appendChild(c.type === 'p' ? buildP(c) : buildMechanic(c)));
        grid.appendChild(colEl);
      });
      frag.appendChild(grid);
    } else if (item.type === 'pullquote') {
      frag.appendChild(el('div','pull-quote',{text:item.text}));
    } else if (item.type === 'divider') {
      frag.appendChild(el('div','divider'));
    } else if (item.type === 'gwenLayout') {
      const layout = el('div','gwen-layout');
      const left = el('div','');
      item.left.forEach(c => {
        if (c.type === 'p') left.appendChild(buildP(c));
        else if (c.type === 'pullquote') left.appendChild(el('div','pull-quote',{text:c.text}));
        else if (c.type === 'divider') left.appendChild(el('div','divider'));
      });
      const sidebar = el('div','gwen-sidebar');
      item.sidebar.forEach(s => {
        const sb = el('div',`sidebar-block${s.blue?' blue':''}`);
        sb.append(el('div','sidebar-label',{text:s.label}), el('div','sidebar-value',{text:s.value}));
        sidebar.appendChild(sb);
      });
      layout.append(left, sidebar);
      frag.appendChild(layout);
    } else if (item.type === 'lastWords') {
      const block = el('div','last-words-block');
      const txt = el('div','last-words-text');
      txt.appendChild(document.createTextNode(item.line1));
      txt.appendChild(el('span','',{text:item.line2}));
      block.append(txt, el('div','last-words-attr',{text:item.attr}));
      frag.appendChild(block);
    } else if (item.type === 'themeGrid') {
      const grid = el('div','themes-grid');
      item.themes.forEach(t => {
        const card = el('div',`theme-card${t.blue?' blue':''}`);
        card.append(el('span','theme-icon',{text:t.icon}), el('div','theme-name',{text:t.name}), el('p','theme-desc',{text:t.desc}));
        grid.appendChild(card);
      });
      frag.appendChild(grid);
    } else if (item.type === 'endingGrid') {
      const grid = el('div','ending-grid');
      item.panels.forEach(p => {
        const panel = el('div',`ending-panel${p.void?' void':''}`);
        panel.append(
          el('div','ending-panel-label',{text:p.label}),
          el('div','ending-panel-title',{text:p.title}),
          el('p','ending-panel-body',{text:p.body})
        );
        if (p.void) panel.appendChild(el('span','void-tag',{text:'// NO_DIALOGUE // NO_MUSIC // SIGNAL_END'}));
        grid.appendChild(panel);
      });
      frag.appendChild(grid);
    }
  });
  return frag;
}

function buildHero() {
  const header = el('header','hero');
  header.appendChild(el('div','hero-glow'));
  [
    {w:500,h:500,top:'-150px',right:'-80px',opacity:.5,delay:'0s'},
    {w:180,h:180,top:'30%',left:'3%',opacity:.3,delay:'3s'},
    {w:90,h:90,bottom:'10%',left:'35%',opacity:.4,delay:'6s'},
    {w:300,h:300,bottom:'-100px',right:'20%',opacity:.2,delay:'1.5s',blue:true},
  ].forEach(h => {
    const hole = el('div','spot-hole');
    hole.style.cssText = `width:${h.w}px;height:${h.h}px;${h.top?`top:${h.top};`:''}${h.bottom?`bottom:${h.bottom};`:''}${h.left?`left:${h.left};`:''}${h.right?`right:${h.right};`:''}opacity:${h.opacity};animation-delay:${h.delay};${h.blue?'border-color:rgba(0,136,255,0.07);':''}`;
    header.appendChild(hole);
  });
  const content = el('div','hero-content');
  const eyebrow = el('p','hero-eyebrow');
  eyebrow.appendChild(document.createTextNode('FAN_CONCEPT // STORY_BREAKDOWN // CHAOS_COEFFICIENT: MAX'));
  eyebrow.appendChild(el('span','cursor-blink'));
  content.appendChild(eyebrow);
  const title = el('h1','hero-title');
  title.setAttribute('data-text','Beyond\nThe Spider-Verse');
  title.innerHTML = 'Beyond<br>The <span class="red">Spider</span>-Verse';
  content.appendChild(title);
  content.appendChild(el('p','hero-subtitle',{text:'// Two anomalies. One broken system. The multiverse will never recover.'}));
  const meta = el('div','hero-meta');
  DATA.meta.forEach(m => {
    const item = el('div',`hero-meta-item${m.blue?' blue-item':''}`);
    item.append(el('span','label',{text:m.label}), el('span','value',{text:m.value}));
    meta.appendChild(item);
  });
  content.appendChild(meta);
  header.appendChild(content);
  return header;
}

function buildSections() {
  return DATA.sections.map(sec => {
    const section = el('section','',{id:sec.id});
    if (sec.bg) section.style.background = sec.bg;
    const container = el('div','container');
    container.appendChild(el('div','section-number',{text:sec.number}));
    container.appendChild(buildTitle(sec.title));
    if (sec.id === 'alliance') {
      const charData = sec.content.find(c => c.type === 'charCards');
      const mechData = sec.content.find(c => c.type === 'mechanic' && c.span);
      const pData    = sec.content.find(c => c.type === 'p');
      const wrap = el('div','char-cards');
      charData.cards.forEach(card => {
        const cardEl = el('div',`char-card ${card.color}-card`);
        const nameEl = el('div',`char-name ${card.color}`);
        nameEl.appendChild(document.createTextNode(card.name + ' '));
        nameEl.appendChild(el('span','char-sub',{text:card.sub}));
        cardEl.append(nameEl, el('p','char-body',{text:card.text}));
        wrap.appendChild(cardEl);
      });
      container.appendChild(wrap);
      container.appendChild(buildMechanic(mechData));
      if (pData) container.appendChild(buildP(pData));
    } else {
      container.appendChild(buildContent(sec.content));
    }
    section.appendChild(container);
    return section;
  });
}

function buildFooter() {
  const footer = el('footer','');
  const left = el('div','');
  left.appendChild(el('div','footer-concept',{text:'CONCEPT_BY: YOU'}));
  const chaos = el('div','footer-chaos');
  chaos.appendChild(document.createTextNode('CHAOS_COEFFICIENT: MAXIMUM'));
  chaos.appendChild(el('span','cursor-blink blue'));
  left.appendChild(chaos);
  footer.append(left, el('div','footer-title',{html:'BEYOND THE<br>SPIDER-VERSE'}));
  return footer;
}

function buildAudioPlayer() {
  const stack = el('div','',{id:'audio-stack'});

  const tracks = [
    { src:'am_i_dreaming.mp3', title:'Am I Dreaming', artist:'Metro Boomin, A$AP Rocky — BTSV', cls:'blue-box' },
    { src:'sunflower.mp3',     title:'Sunflower',      artist:'Post Malone & Swae Lee — ITSV',  cls:'red-box'  },
  ];

  let firstInteract = false;

  tracks.forEach(track => {
    const audio = new Audio(track.src);
    audio.volume = 0.5;

    const box = el('div', `audio-box ${track.cls}`);

    const btn = el('button','audio-play-btn');
    btn.textContent = '▶';

    const info = el('div','audio-info');
    const progressWrap = el('div','audio-progress-wrap');
    const progressBar  = el('div','audio-progress-bar');
    progressWrap.appendChild(progressBar);
    info.append(
      el('div','audio-title', {text: track.title}),
      el('div','audio-artist',{text: track.artist}),
      progressWrap
    );

    const vol = el('button','audio-vol');
    vol.textContent = '▪VOL';

    box.append(btn, info, vol);
    stack.appendChild(box);

    let playing = false;

    const tryPlay = () => audio.play().then(() => { playing = true; btn.textContent = '▐▐'; }).catch(()=>{});

    btn.addEventListener('click', () => {
      if (playing) { audio.pause(); playing = false; btn.textContent = '▶'; }
      else tryPlay();
    });

    vol.addEventListener('click', () => {
      audio.muted = !audio.muted;
      vol.textContent = audio.muted ? '✕VOL' : '▪VOL';
      vol.style.color = audio.muted ? (track.cls === 'red-box' ? 'var(--red)' : 'var(--blue)') : '';
    });

    audio.addEventListener('timeupdate', () => {
      if (audio.duration) progressBar.style.width = (audio.currentTime / audio.duration * 100) + '%';
    });

    audio.addEventListener('ended', () => { playing = false; btn.textContent = '▶'; progressBar.style.width = '0%'; });

    progressWrap.addEventListener('click', e => {
      const rect = progressWrap.getBoundingClientRect();
      audio.currentTime = ((e.clientX - rect.left) / rect.width) * audio.duration;
    });

    // autoplay first track on first interaction
    if (track.cls === 'blue-box') {
      const autoplayOnce = () => {
        if (!firstInteract) { firstInteract = true; tryPlay(); }
        document.removeEventListener('click', autoplayOnce);
        document.removeEventListener('keydown', autoplayOnce);
      };
      document.addEventListener('click', autoplayOnce);
      document.addEventListener('keydown', autoplayOnce);
    }
  });

  return stack;
}

function initMatrix() {
  const canvas = document.getElementById('matrix-canvas');
  const ctx = canvas.getContext('2d');
  const resize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
  resize();
  window.addEventListener('resize', resize);
  const chars = 'ANOMALY ERROR CANON MILES SPOT GWEN HOBIE 0101 スパイダー BROKEN VOID EVOLUTION';
  const fontSize = 13;
  let drops = [];
  const initDrops = () => { drops = Array(Math.floor(canvas.width/fontSize)).fill(0).map(()=>Math.random()*-canvas.height/fontSize); };
  initDrops();
  window.addEventListener('resize', initDrops);
  setInterval(() => {
    ctx.fillStyle = 'rgba(0,0,0,0.06)';
    ctx.fillRect(0,0,canvas.width,canvas.height);
    const arr = chars.split('');
    drops.forEach((d,i) => {
      ctx.fillStyle = i%5===0 ? '#0044aa' : '#8a0010';
      ctx.font = `${fontSize}px Share Tech Mono,monospace`;
      ctx.fillText(arr[Math.floor(Math.random()*arr.length)], i*fontSize, d*fontSize);
      if (d*fontSize > canvas.height && Math.random()>0.975) drops[i]=0;
      drops[i]+=0.35;
    });
  }, 50);
}

function initInteractivity() {
  const observer = new IntersectionObserver(entries => {
    entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
  }, {threshold:0.08});
  document.querySelectorAll('section').forEach(s => observer.observe(s));
  setInterval(() => {
    const els = document.querySelectorAll('.section-title, .hero-title');
    const target = els[Math.floor(Math.random()*els.length)];
    if (!target) return;
    target.style.transform = `translate(${(Math.random()-.5)*8}px,${(Math.random()-.5)*3}px) skewX(${(Math.random()-.5)*5}deg)`;
    target.style.filter = Math.random()>.5 ? 'hue-rotate(180deg) saturate(2)' : 'none';
    setTimeout(() => { target.style.transform=''; target.style.filter=''; }, 60+Math.random()*80);
  }, 2500+Math.random()*3000);
}

document.addEventListener('DOMContentLoaded', () => {
  document.body.appendChild(buildHero());
  buildSections().forEach(s => document.body.appendChild(s));
  document.body.appendChild(buildFooter());
  document.body.appendChild(buildAudioPlayer());
  initMatrix();
  initInteractivity();
});
</script>
